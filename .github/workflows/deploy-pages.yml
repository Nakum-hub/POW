name: Deploy demo to GitHub Pages

# Publishes a backend-free public demo of SkillOS to GitHub Pages.
#
# This workflow is MANUAL on purpose: run it from the Actions tab
# (Actions -> "Deploy demo to GitHub Pages" -> "Run workflow") whenever you
# want to publish/refresh the demo. Running it manually keeps it from showing
# up as a failing check on every commit before Pages has been set up, and the
# `enablement: true` below turns Pages on for you on the first run, so there is
# no separate "Settings -> Pages" step required.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (public demo, Pages base path)
        env:
          VITE_PUBLIC_DEMO: 'true'
          VITE_BASE_PATH: /POW/
        run: npm run build
      - name: Add SPA fallback for client-side routing
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
        with:
          # Turn Pages on automatically on the first manual run.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
