name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  # tsconfig.app.json only includes `src`, so the job above never typechecks
  # anything under supabase/functions/ -- a Deno edge function with a typo
  # could pass every gate in `validate` and still be broken. This job is the
  # only thing in CI that actually checks the edge functions themselves.
  validate-edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # *.test.ts files are Vitest-only (bare 'vitest' specifier, extensionless
      # relative imports) and must never be passed to `deno check`/`deno lint`.
      # `find` is used instead of a `**` glob because bash's globstar isn't
      # enabled by default in non-interactive shells, including this runner's.
      - name: Typecheck edge functions
        run: |
          files=$(find supabase/functions -name '*.ts' ! -name '*.test.ts')
          echo "Checking: $files"
          deno check $files
      - name: Lint edge functions
        run: deno lint supabase/functions/
